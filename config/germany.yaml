name: Germany

boundary_file: data/raw/boundaries/germany/VG250_GEM.shp
census_file: data/raw/census/germany/1000A-0001_en.csv
join_key_boundary: ARS_0      # municipality identifier in VG250_GEM
join_key_census: ARS_0        # matching identifier in census CSV
population_col: Persons
crs: EPSG:3035                # ETRS89 / LAEA Europe

census_read_csv_options:
  sep: ";"
  encoding: latin1
  dtype:
    ARS_0: string

census_filters: {}

filters:
  min_population: 100000
  min_area_km2: 50
  density_threshold: 1000

clip_radius_km: 50

